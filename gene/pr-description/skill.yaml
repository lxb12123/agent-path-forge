# gene/pr-description/skill.yaml
name: pr-description
description: Summarize this branch's commits and changes relative to the base into a PR description (deterministically read log/diffstat + LLM synthesis)
when-to-use: Before opening a Pull Request, when you need to generate a title/summary/test plan from this branch's commits relative to the base
version: "0.1.0"
# Self-describing primitives (gene #5)
uses:
  mcp: []
  permissions: ["Bash(node *)"]   # /pr-description needs to run collect-commits.mjs
  subagents: []
