# gene/commit/skill.yaml
name: commit
description: Turn the staged changes into a well-formed commit message (deterministically read the staging area + LLM generation)
when-to-use: When changes are staged with git add, you're ready to commit, and you need a clear Conventional Commits message
version: "0.1.0"
# Self-describing primitives (gene #5)
uses:
  mcp: []
  permissions: ["Bash(node *)"]   # /commit needs to run collect-staged.mjs
  subagents: []
