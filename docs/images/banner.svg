<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="640" viewBox="0 0 1600 640" role="img" aria-labelledby="title desc">
  <title id="title">Agent Path Forge</title>
  <desc id="desc">One idea follows a golden path and becomes an installable multi-host plugin.</desc>

